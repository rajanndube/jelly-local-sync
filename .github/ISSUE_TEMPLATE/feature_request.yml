name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      description: This tool is intentionally minimal.
      options:
        - label: This can be done with no new runtime dependencies (built-in Node only).
        - label: This does not break the existing SDK wire contract.
