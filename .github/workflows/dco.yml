name: DCO

# Verifies every commit in a PR carries a `Signed-off-by` trailer that matches
# its author — the Developer Certificate of Origin (https://developercertificate.org/).
# Self-contained (no third-party action), in keeping with the repo's zero-dep ethos.

on:
  pull_request:
    branches: [main]

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on every commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          fail=0
          for sha in $(git rev-list "$BASE..$HEAD"); do
            subject="$(git show -s --format='%s' "$sha")"
            # Merge commits have >1 parent and are exempt from sign-off.
            if [ "$(git show -s --format='%P' "$sha" | wc -w)" -gt 1 ]; then
              echo "⏭️  $sha (merge) — skipped"
              continue
            fi
            author="$(git show -s --format='%an <%ae>' "$sha")"
            signoff="$(git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$sha" | head -n1 | sed 's/[[:space:]]*$//')"
            if [ -z "$signoff" ]; then
              echo "❌ $sha — missing Signed-off-by  ($subject)"
              fail=1
            elif [ "$signoff" != "$author" ]; then
              echo "❌ $sha — sign-off '$signoff' ≠ author '$author'  ($subject)"
              fail=1
            else
              echo "✅ $sha — $signoff"
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more commits are not signed off. See CONTRIBUTING.md."
            echo "Fix the whole branch with:  git rebase --signoff main && git push --force-with-lease"
            exit 1
          fi
