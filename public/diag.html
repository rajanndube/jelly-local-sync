<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Jelly · Connection test</title>
  <style>
    :root { --bg:#0b0b0d; --surface:#161619; --border:#2a2a2f; --text:#f4f4f5; --dim:#a1a1aa; --mute:#71717a; --ok:#84cc16; --bad:#ef4444; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased; padding: max(24px, env(safe-area-inset-top)) 22px 32px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .logo { width: 30px; height: 30px; background: var(--ok); border-radius: 9px; margin: 14px 0 18px; }
    h1 { font-size: 19px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
    .sub { color: var(--dim); font-size: 14px; margin: 0 0 24px; max-width: 340px; }
    .list { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 8px; text-align: left; }
    .row {
      display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
    }
    .row .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--mute); flex-shrink: 0; }
    .row.ok .dot { background: var(--ok); box-shadow: 0 0 8px rgba(132,204,22,.4); }
    .row.bad .dot { background: var(--bad); }
    .row.pending .dot { background: var(--mute); animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
    .row .ip { flex: 1; font: 14px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .row .iface { font-size: 11px; color: var(--mute); }
    .row .verdict { font-size: 12px; font-weight: 600; }
    .row.ok .verdict { color: var(--ok); }
    .row.bad .verdict { color: var(--bad); }
    .banner { width: 100%; max-width: 380px; margin-top: 24px; padding: 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .banner.ok { background: rgba(132,204,22,.1); border: 1px solid rgba(132,204,22,.3); }
    .banner.bad { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); }
    .banner b { color: var(--text); }
    code { background: rgba(255,255,255,.08); padding: 1px 6px; border-radius: 5px; font: 13px ui-monospace, Menlo, monospace; }
  </style>
</head>
<body>
  <div class="logo"></div>
  <h1>Connection test</h1>
  <p class="sub">Checking which addresses this phone can reach on the laptop running Jelly Local Sync.</p>
  <div class="list" id="list"></div>
  <div class="banner" id="banner" hidden></div>

  <script>
  (function () {
    var TOKEN = '__TOKEN__';
    var PORT = '__PORT__';
    var LOADED_FROM = '__LOADED_FROM__';            // host:port this page loaded from, reachable by definition
    var CANDIDATES = __CANDIDATES__;                 // [{ip, iface}, ...]
    var list = document.getElementById('list');
    var banner = document.getElementById('banner');

    // The address this page loaded from is reachable (we're running). Make sure
    // it's in the set we display even if it somehow isn't in CANDIDATES.
    var loadedIp = (LOADED_FROM.split(':')[0]) || '';
    if (loadedIp && !CANDIDATES.some(function (c) { return c.ip === loadedIp; })) {
      CANDIDATES = [{ ip: loadedIp, iface: 'this page' }].concat(CANDIDATES);
    }

    var rows = {};
    CANDIDATES.forEach(function (c) {
      var row = document.createElement('div');
      row.className = 'row pending';
      row.innerHTML = '<span class="dot"></span><span class="ip"></span><span class="iface"></span><span class="verdict">testing…</span>';
      row.querySelector('.ip').textContent = c.ip;
      row.querySelector('.iface').textContent = c.iface;
      list.appendChild(row);
      rows[c.ip] = row;
    });

    function probe(c) {
      var url = 'http://' + c.ip + ':' + PORT + '/ping';
      var t0 = (performance && performance.now) ? performance.now() : Date.now();
      var ctrl = new AbortController();
      var to = setTimeout(function () { ctrl.abort(); }, 4000);
      return fetch(url, { signal: ctrl.signal, cache: 'no-store' })
        .then(function (r) { return r.ok; })
        .catch(function () { return false; })
        .then(function (ok) {
          clearTimeout(to);
          var ms = Math.round(((performance && performance.now) ? performance.now() : Date.now()) - t0);
          return { ip: c.ip, iface: c.iface, ok: ok, ms: ms };
        });
    }

    Promise.all(CANDIDATES.map(probe)).then(function (results) {
      results.forEach(function (r) {
        var row = rows[r.ip];
        row.className = 'row ' + (r.ok ? 'ok' : 'bad');
        row.querySelector('.verdict').textContent = r.ok ? 'reachable · ' + r.ms + 'ms' : 'no route';
      });

      var reachable = results.filter(function (r) { return r.ok; });
      if (reachable.length) {
        banner.className = 'banner ok';
        banner.innerHTML = 'This phone can reach the laptop on <b>' + reachable[0].ip + '</b>. ' +
          'Head back to the dashboard, it now highlights the working address. Paste it (or re-scan the main QR) into the Jelly toolbar.';
      } else {
        banner.className = 'banner bad';
        banner.innerHTML = '<b>No route to the laptop on any address.</b> The phone and laptop may be on different Wi-Fi networks, ' +
          'or the network blocks device-to-device traffic (guest Wi-Fi, corporate MDM), or a firewall is blocking the port. ' +
          'See the troubleshooter on the dashboard for next steps.';
      }
      banner.hidden = false;

      // Report back to the dashboard (relayed over SSE). Same-origin POST.
      try {
        fetch('/r/' + TOKEN + '/diag', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ loadedFrom: LOADED_FROM, results: results, ua: navigator.userAgent })
        }).catch(function () {});
      } catch (e) {}
    });
  })();
  </script>
</body>
</html>
