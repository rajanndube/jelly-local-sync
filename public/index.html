<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jelly Local Sync</title>
<style>
  :root {
    --bg: #0b0b0d;
    --surface: #161619;
    --surface-hi: #1f1f23;
    --surface-2: #1a1a1e;
    --border: #2a2a2f;
    --border-hi: #3a3a40;
    --text: #f4f4f5;
    --text-dim: #a1a1aa;
    --text-mute: #71717a;
    --accent: #84cc16;
    --accent-hi: #a3e635;
    --accent-soft: rgba(132, 204, 22, 0.15);
    --danger: #ef4444;
    --warn: #f59e0b;
    --info: #3b82f6;
    --sidebar-w: 340px;

    /* Stronger-than-stock easings (the built-in CSS curves feel weak). */
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  a { color: var(--accent); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

  /* ── App shell: persistent left rail + scrolling main column ────────── */
  .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; height: 100vh; }
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    height: 100vh; overflow-y: auto;
    display: flex; flex-direction: column;
    padding: 20px 18px 24px;
  }
  .main { height: 100vh; overflow-y: auto; }
  .main-inner { max-width: 760px; margin: 0 auto; padding: 28px 28px 96px; }

  /* ── Brand + server status ──────────────────────────────────────────── */
  .brand { display: flex; align-items: center; gap: 9px; margin-bottom: 22px; }
  .brand .logo { width: 20px; height: 20px; background: var(--accent); border-radius: 6px; flex-shrink: 0; }
  .brand h1 { font-size: 15px; font-weight: 600; margin: 0; letter-spacing: -0.01em; flex: 1; }
  .server-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--text-mute);
    transition: background 0.2s ease, box-shadow 0.2s ease; flex-shrink: 0;
  }
  .server-dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent-soft); }
  .server-dot.down { background: var(--warn); animation: jly-pulse 1.4s ease-in-out infinite; }

  /* ── Sidebar sections ───────────────────────────────────────────────── */
  .sec { margin-bottom: 22px; }
  .sec-head { display: flex; align-items: baseline; justify-content: space-between; margin: 0 0 10px; }
  .sec-head h2 {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-dim); margin: 0;
  }
  .sec-head .count { font-size: 11px; color: var(--text-mute); font-variant-numeric: tabular-nums; }

  /* ── Device list ────────────────────────────────────────────────────── */
  #device-list { display: flex; flex-direction: column; gap: 6px; }
  .device-row {
    display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 10px;
    width: 100%; text-align: left; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 11px; cursor: pointer; color: var(--text);
    transition: border-color 0.14s ease, background 0.14s ease, transform 0.1s var(--ease-out);
  }
  .device-row:active { transform: scale(0.985); }
  .device-row.active { border-color: var(--border-hi); background: var(--surface-hi); }
  .device-row .swatch {
    position: relative; width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #0b0b0d;
  }
  .device-row .swatch .live-dot {
    position: absolute; right: -2px; bottom: -2px; width: 9px; height: 9px; border-radius: 50%;
    border: 2px solid var(--surface-2); background: var(--text-mute);
  }
  .device-row.active .swatch .live-dot { border-color: var(--surface-hi); }
  .device-row .swatch .live-dot.live { background: var(--accent); }
  .device-row .swatch .live-dot.live.pulse { animation: jly-pulse 2s ease-in-out infinite; }
  .device-row .swatch .live-dot.stale { background: var(--warn); }
  .device-meta { min-width: 0; }
  .device-name {
    font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .device-sub { font-size: 11px; color: var(--text-mute); line-height: 1.3; font-variant-numeric: tabular-nums; }
  .device-tally {
    font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums;
    background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px;
  }
  .device-empty {
    display: flex; flex-direction: column; align-items: center; text-align: center; gap: 9px;
    font-size: 12px; color: var(--text-mute); line-height: 1.5;
    border: 1px dashed var(--border); border-radius: 10px; padding: 18px 14px;
  }
  .device-empty svg { color: var(--text-dim); opacity: 0.75; }
  .device-empty .pulse-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--text-mute);
    margin-right: 7px; vertical-align: 0; animation: jly-pulse 2s ease-in-out infinite;
  }
  @keyframes jly-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* ── Sidebar "Connect a device" button (shown once ≥1 device paired) ── */
  .connect-btn {
    margin-top: auto; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px;
    color: var(--text); font-size: 13px; font-weight: 500;
  }
  .connect-btn[hidden] { display: none; }
  .connect-btn svg { opacity: 0.7; }

  /* ── Connect panel — shared by the empty-state hero and the modal ───── */
  .field-label { font-size: 11px; color: var(--text-mute); margin: 0 0 6px; }
  .url-box { display: flex; gap: 6px; align-items: stretch; }
  .url-input {
    flex: 1; min-width: 0; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text);
    user-select: all; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .url-input.lan { color: var(--text-dim); }

  /* The connect panel is a two-pane shell: the always-visible "scan / paste"
     column, and a setup-help column that expands to the RIGHT on demand —
     rather than dumping a tall stack of tabs and steps downward. */
  .connect-shell { display: flex; align-items: flex-start; }
  .cp { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; text-align: center; }

  .cp-help-toggle {
    display: inline-flex; align-items: center; gap: 7px; margin-top: 18px;
    background: transparent; border: 0; color: var(--text-dim); font-size: 12.5px;
    padding: 6px 10px; border-radius: 8px; transition: color 0.12s ease, background 0.12s ease;
  }
  .cp-help-toggle .chev { transition: transform 0.25s var(--ease-out); opacity: 0.7; }
  .connect-shell.expanded .cp-help-toggle { color: var(--text); background: var(--surface-hi); }
  .connect-shell.expanded .cp-help-toggle .chev { transform: rotate(90deg); }
  @media (hover: hover) and (pointer: fine) { .cp-help-toggle:hover { color: var(--text); background: var(--surface-hi); } }

  .cp-setup { width: 0; flex-shrink: 0; overflow: hidden; opacity: 0; transition: width 0.32s var(--ease-out), opacity 0.22s ease; }
  .connect-shell.expanded .cp-setup { width: 340px; opacity: 1; }
  .cp-setup-inner {
    box-sizing: border-box; width: 340px; padding: 2px 2px 2px 26px; text-align: left;
    border-left: 1px solid var(--border);
    transform: translateX(8px); transition: transform 0.32s var(--ease-out);
  }
  .connect-shell.expanded .cp-setup-inner { transform: translateX(0); }
  .cp-setup-title { font-size: 13px; font-weight: 600; margin: 0 0 14px; color: var(--text); letter-spacing: -0.01em; }

  .cp-qr { position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .cp-qr canvas {
    display: block; border-radius: 12px; image-rendering: pixelated; image-rendering: crisp-edges;
    background: #fff; padding: 10px; box-sizing: border-box; width: 100%; height: 100%;
  }
  /* Greyed placeholder keeps the layout stable when no LAN IP is available. */
  .cp-qr.disabled::before {
    content: ""; position: absolute; inset: 0; border-radius: 12px;
    background:
      repeating-linear-gradient(0deg, var(--border-hi) 0 6px, transparent 6px 12px),
      repeating-linear-gradient(90deg, var(--border-hi) 0 6px, transparent 6px 12px);
    background-color: var(--surface-2); opacity: 0.35;
  }
  .cp-qr.disabled canvas { display: none; }
  .cp-qr .qr-hint {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    padding: 24px; margin: 0; font-size: 12px; line-height: 1.5; color: var(--text-mute); text-align: center;
  }
  .cp-title { font-size: 17px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
  .cp-sub { font-size: 13px; color: var(--text-dim); margin: 0 0 22px; line-height: 1.5; max-width: 320px; }
  .cp-or {
    display: flex; align-items: center; gap: 12px; width: 100%; max-width: 380px; margin: 4px 0 14px;
    color: var(--text-mute); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .cp-or::before, .cp-or::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .cp-fields { width: 100%; max-width: 380px; text-align: left; }
  .cp-fields .lan-row { margin-top: 12px; }

  /* Hero: connect panel takes the main column when no device is paired yet. */
  .connect-hero { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 120px); padding: 24px 0; animation: jly-fade 0.25s ease both; }
  .connect-hero[hidden] { display: none; }

  /* Connect modal: card width follows content so it grows gracefully to the
     right as the setup pane expands. */
  .connect-modal .modal-card { width: auto; max-width: min(94vw, 760px); padding: 26px 28px; transition: max-width 0.32s var(--ease-out); }
  .modal-close {
    position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center; border-radius: 8px;
    background: transparent; border: 1px solid transparent; color: var(--text-mute);
  }

  /* ── Buttons ────────────────────────────────────────────────────────── */
  button {
    background: var(--surface-hi); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 9px 13px; font: inherit; font-size: 13px; cursor: pointer;
    white-space: nowrap; transition: background 0.12s ease, border-color 0.12s ease, transform 0.1s var(--ease-out);
  }
  button:active { transform: scale(0.97); }
  button.primary { background: var(--accent); color: #0b0b0d; border-color: var(--accent); font-weight: 600; }
  button.copied { background: var(--accent); color: #0b0b0d; border-color: var(--accent); }
  @media (hover: hover) and (pointer: fine) {
    button:hover { background: var(--border); border-color: var(--border-hi); }
    button.primary:hover { background: var(--accent-hi); border-color: var(--accent-hi); }
  }

  /* ── Setup instructions (the right-hand pane of the connect shell) ──── */
  .tabs { display: flex; gap: 4px; margin: 0 0 12px; padding: 3px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; }
  .tab {
    flex: 1; background: transparent; border: 1px solid transparent; color: var(--text-dim);
    padding: 6px 8px; border-radius: 6px; font-size: 11.5px; cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .tab.active { background: var(--surface-hi); color: var(--text); border-color: var(--border); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .setup-steps { margin: 0; padding: 0; list-style: none; }
  .setup-steps li { padding: 9px 0; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; font-size: 12px; color: var(--text-dim); line-height: 1.5; }
  .setup-steps li:first-child { border-top: 0; padding-top: 2px; }
  .setup-steps .num { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; background: var(--surface-hi); color: var(--text); font-size: 10px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
  .setup-steps code { background: var(--surface-hi); padding: 1px 5px; border-radius: 4px; font: 11px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text); }
  .setup-steps b { color: var(--text); font-weight: 600; }
  .cmd { display: flex; align-items: stretch; gap: 4px; background: #0b0b0d; border: 1px solid var(--border); border-radius: 6px; padding: 2px 2px 2px 9px; margin: 7px 0; }
  .cmd code { flex: 1; font: 11px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text); align-self: center; padding: 5px 0; user-select: all; background: transparent; overflow-x: auto; white-space: nowrap; }
  .cmd-copy { background: transparent; border: 0; color: var(--text-dim); font-size: 11px; padding: 5px 9px; border-radius: 4px; }
  .cmd-copy.copied { color: var(--accent); }
  .note { background: rgba(245, 158, 11, 0.07); border: 1px solid rgba(245, 158, 11, 0.18); border-radius: 6px; padding: 8px 11px; margin-top: 9px; font-size: 11px; color: var(--text-dim); line-height: 1.5; }
  .note b { color: #fcd34d; font-weight: 600; }
  .refresh-note { margin: 12px 0 0; color: var(--text-mute); font-size: 11px; line-height: 1.5; }

  /* ── Main: feed header + filters ────────────────────────────────────── */
  .feed-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
  .feed-head h2 { font-size: 19px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .feed-head .count { color: var(--text-mute); font-size: 13px; font-weight: 400; font-variant-numeric: tabular-nums; margin-left: 8px; }
  .btn-clear-all { background: transparent; border: 0; color: var(--text-mute); font-size: 12px; font-weight: 500; padding: 6px 10px; border-radius: 7px; transition: color 0.12s ease, background 0.12s ease; }
  .btn-clear-all:disabled { opacity: 0.35; cursor: default; }
  @media (hover: hover) and (pointer: fine) {
    .btn-clear-all:hover:not(:disabled) { color: #fca5a5; background: rgba(239, 68, 68, 0.1); }
  }

  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin: 14px 0 20px; }
  .filters[hidden] { display: none; }
  .chip {
    display: inline-flex; align-items: center; gap: 7px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 999px; padding: 5px 12px; font-size: 12px; cursor: pointer;
    transition: border-color 0.12s ease, color 0.12s ease, background 0.12s ease, transform 0.1s var(--ease-out);
  }
  .chip:active { transform: scale(0.96); }
  .chip.active { color: var(--text); border-color: var(--border-hi); background: var(--surface-hi); }
  .chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chip .chip-n { color: var(--text-mute); font-variant-numeric: tabular-nums; }
  .chip.active .chip-n { color: var(--text-dim); }

  /* ── Annotation feed ────────────────────────────────────────────────── */
  .empty { text-align: center; padding: 72px 24px; color: var(--text-mute); border: 1px dashed var(--border); border-radius: 14px; }
  .empty[hidden] { display: none; }
  .empty .pulse-dot { display: inline-block; width: 10px; height: 10px; background: var(--text-mute); border-radius: 50%; margin-right: 8px; vertical-align: 1px; animation: jly-pulse 2s ease-in-out infinite; }

  .ann { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 16px; }
  .ann.enter { animation: jly-card-in 0.28s var(--ease-out) both; }
  @keyframes jly-card-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .ann-img { width: 100%; max-height: 480px; object-fit: contain; background: #000; display: block; }
  .ann-img.placeholder { aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; color: var(--text-mute); font-size: 12px; background: var(--surface-2); }
  .ann-body { padding: 15px 17px; }

  /* Device tag — the "who sent this" line at the top of every card. */
  .ann-device { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 11px; max-width: 100%; }
  .ann-device .chip-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
  .ann-device .name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ann-device .plat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-mute); background: var(--surface-hi); border-radius: 4px; padding: 1px 6px; flex-shrink: 0; }

  .ann-comment { font-size: 15px; color: var(--text); margin: 0 0 11px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 11px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; letter-spacing: 0.01em; }
  .badge.intent-fix { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
  .badge.intent-change { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
  .badge.intent-question { background: rgba(59, 130, 246, 0.15); color: #93c5fd; }
  .badge.intent-approve { background: rgba(132, 204, 22, 0.15); color: #bef264; }
  .badge.severity-blocking { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
  .badge.severity-important { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
  .badge.severity-suggestion { background: rgba(161, 161, 170, 0.2); color: #d4d4d8; }
  .badge.kind { background: var(--surface-hi); color: var(--text-dim); }
  .ann-meta { display: flex; flex-wrap: wrap; gap: 4px 14px; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text-mute); margin-bottom: 12px; }
  .ann-meta b { color: var(--text-dim); font-weight: 500; }
  .ann-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .ann-actions button { font-size: 12px; padding: 6px 11px; }
  .ann-actions .btn-del { margin-left: auto; color: var(--text-mute); border-color: transparent; background: transparent; }
  @media (hover: hover) and (pointer: fine) {
    .ann-actions .btn-del:hover { color: #fca5a5; background: rgba(239, 68, 68, 0.1); border-color: transparent; }
  }

  /* ── Toast + modal ──────────────────────────────────────────────────── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border-hi); padding: 10px 16px; border-radius: 999px; font-size: 13px; color: var(--text); opacity: 0; transition: opacity 0.2s ease, transform 0.2s var(--ease-out); pointer-events: none; z-index: 60; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 24px; backdrop-filter: blur(2px); animation: jly-fade 0.15s ease-out; }
  .modal-backdrop[hidden] { display: none; }
  .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; max-width: 420px; width: 100%; animation: jly-modal-in 0.2s var(--ease-out); }
  .modal-title { font-size: 16px; font-weight: 600; margin: 0 0 8px; color: var(--text); }
  .modal-body { font-size: 13px; color: var(--text-dim); margin: 0 0 18px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  @keyframes jly-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes jly-modal-in { from { opacity: 0; transform: translateY(-6px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .btn-danger { background: var(--danger); border: 1px solid var(--danger); color: #fff; font-weight: 500; padding: 8px 16px; border-radius: 7px; font-size: 13px; transition: background 0.12s ease, border-color 0.12s ease, transform 0.1s var(--ease-out); }
  .btn-danger:active { transform: scale(0.97); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 7px; font-size: 13px; transition: background 0.12s ease, border-color 0.12s ease, transform 0.1s var(--ease-out); }
  .btn-ghost:active { transform: scale(0.97); }
  @media (hover: hover) and (pointer: fine) {
    .btn-danger:hover { background: #dc2626; border-color: #dc2626; }
    .btn-ghost:hover { background: var(--surface-hi); border-color: var(--border-hi); }
  }

  /* On narrow screens there's no room to expand sideways — stack the setup
     pane below the scan/paste column instead. */
  @media (max-width: 760px) {
    .connect-shell { flex-direction: column; align-items: center; }
    .cp { width: 100%; max-width: 360px; }
    .cp-setup { width: 100% !important; max-width: 360px; opacity: 1; transition: none; }
    .connect-shell:not(.expanded) .cp-setup { display: none; }
    .cp-setup-inner { width: 100%; border-left: 0; border-top: 1px solid var(--border); padding: 18px 0 0; margin-top: 18px; transform: none; }
  }

  /* ── Responsive: collapse the rail above the feed on narrow screens ─── */
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; height: auto; }
    .sidebar { height: auto; border-right: 0; border-bottom: 1px solid var(--border); }
    .main { height: auto; }
    .connect { margin-top: 22px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    .ann.enter { animation: jly-fade 0.2s ease both; }
  }
</style>
</head>
<body>
  <div class="app">
    <!-- ── Left rail: identity, live devices, and (secondary) connect ── -->
    <aside class="sidebar">
      <div class="brand">
        <span class="logo"></span>
        <h1>Jelly Local Sync</h1>
        <span class="server-dot" id="server-dot" title="Server connection"></span>
      </div>

      <div class="sec">
        <div class="sec-head">
          <h2>Devices</h2>
          <span class="count" id="device-count"></span>
        </div>
        <div id="device-list"></div>
      </div>

      <button class="connect-btn" id="connect-btn" type="button" hidden>
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3v10M3 8h10"/></svg>
        Connect a device
      </button>
    </aside>

    <!-- ── Main: the live annotation feed ── -->
    <main class="main">
      <div class="main-inner">
        <!-- Empty-state hero: connecting the first device IS the task here. -->
        <div class="connect-hero" id="connect-hero" hidden></div>

        <!-- Feed view: shown once at least one device has paired. -->
        <div id="feed-view" hidden>
          <div class="feed-head">
            <h2>Annotations<span class="count" id="count">0</span></h2>
            <button class="btn-clear-all" id="clear-all" type="button" disabled>Delete all</button>
          </div>
          <div class="filters" id="filters" hidden></div>
          <div id="feed"></div>
          <div id="empty" class="empty"><span class="pulse-dot"></span>Waiting for the first annotation…</div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <div id="connect-modal" class="modal-backdrop connect-modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Connect a device" style="position: relative;">
      <button class="modal-close" id="connect-close" type="button" aria-label="Close">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8"/></svg>
      </button>
      <div id="connect-modal-mount"></div>
    </div>
  </div>

  <div id="confirm-modal" class="modal-backdrop" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-body">
      <h3 class="modal-title" id="confirm-title">Are you sure?</h3>
      <p class="modal-body" id="confirm-body"></p>
      <div class="modal-actions">
        <button class="btn-ghost" id="confirm-cancel" type="button">Cancel</button>
        <button class="btn-danger" id="confirm-ok" type="button">Confirm</button>
      </div>
    </div>
  </div>

<script src="/qrcode.js"></script>
<script>
(() => {
  const TOKEN = '__TOKEN__';
  const PORT = '__PORT__';
  const LAN_IP = '__LAN_IP__';
  const ORIGIN = location.origin;
  const BASE = ORIGIN + '/r/' + TOKEN;

  const endpointUrl = BASE;
  const lanEndpoint = LAN_IP ? `http://${LAN_IP}:${PORT}/r/${TOKEN}` : '';

  const $ = (id) => document.getElementById(id);

  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), 1400);
  }

  function flashCopied(btn) {
    if (!btn) { toast('Copied'); return; }
    const orig = btn.textContent;
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1100);
  }

  // Text copy. Modern Clipboard API first; hidden-textarea fallback when
  // navigator.clipboard is unavailable (http://<LAN-IP> isn't a secure context).
  async function copy(text, btn) {
    let ok = false;
    if (navigator.clipboard?.writeText) {
      try { await navigator.clipboard.writeText(text); ok = true; } catch { /* fall through */ }
    }
    if (!ok) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '0';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { ta.setSelectionRange(0, text.length); } catch {}
      try { ok = document.execCommand('copy'); } catch {}
      document.body.removeChild(ta);
    }
    if (ok) flashCopied(btn);
    else toast('Copy failed — try ⌘/Ctrl+C');
  }

  // Re-encode any image Blob (often image/webp) to PNG — clipboard.write only
  // accepts image/png in Chrome and Safari.
  async function blobToPng(blob) {
    if (blob.type === 'image/png') return blob;
    const url = URL.createObjectURL(blob);
    try {
      const img = await new Promise((resolve, reject) => {
        const i = new Image();
        i.onload = () => resolve(i);
        i.onerror = () => reject(new Error('image decode failed'));
        i.src = url;
      });
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth || img.width;
      canvas.height = img.naturalHeight || img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      return await new Promise((resolve, reject) => {
        canvas.toBlob((b) => (b ? resolve(b) : reject(new Error('canvas.toBlob failed'))), 'image/png');
      });
    } finally {
      URL.revokeObjectURL(url);
    }
  }

  async function copyImage(imgUrl, btn) {
    if (!navigator.clipboard?.write || typeof ClipboardItem === 'undefined') {
      toast('Image clipboard not supported — opening for manual copy');
      try { window.open(imgUrl, '_blank'); } catch {}
      return;
    }
    try {
      const item = new ClipboardItem({
        'image/png': fetch(imgUrl).then((r) => r.blob()).then(blobToPng),
      });
      await navigator.clipboard.write([item]);
      flashCopied(btn);
    } catch {
      try {
        const blob = await blobToPng(await (await fetch(imgUrl)).blob());
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        flashCopied(btn);
      } catch {
        toast('Image clipboard blocked — opening for manual copy');
        try { window.open(imgUrl, '_blank'); } catch {}
      }
    }
  }

  // ── Connect panel ────────────────────────────────────────────────────────
  // "Connecting a device" is one action: point the phone at the QR. The QR is
  // the hero; pasting the URL is the quiet fallback; per-platform steps tuck
  // behind a disclosure. The same panel is the empty-state hero (main column,
  // before any device pairs) and the "Connect another device" modal afterwards.
  //
  // The QR encodes the LAN URL — the only URL a phone camera can resolve
  // (localhost would mean "the phone itself"). Vendored qrcode-generator (MIT).
  function drawQR(canvas) {
    if (!lanEndpoint || typeof qrcode === 'undefined') return false;
    try {
      const qr = qrcode(0, 'L');
      qr.addData(lanEndpoint);
      qr.make();
      const size = qr.getModuleCount();
      const scale = 5, padding = 4;
      const px = (size + padding * 2) * scale;
      canvas.width = px;
      canvas.height = px;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, px, px);
      ctx.fillStyle = '#000000';
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          if (qr.isDark(y, x)) ctx.fillRect((x + padding) * scale, (y + padding) * scale, scale, scale);
        }
      }
      return true;
    } catch { return false; }
  }

  const CP_HTML = `
    <div class="connect-shell">
      <div class="cp">
        <div class="cp-qr"><canvas aria-label="QR code to connect a device"></canvas><p class="qr-hint"></p></div>
        <h3 class="cp-title"></h3>
        <p class="cp-sub"></p>
        <div class="cp-or">or paste the URL</div>
        <div class="cp-fields">
          <p class="field-label">Endpoint URL</p>
          <div class="url-box">
            <input class="url-input cp-endpoint" readonly />
            <button class="primary cp-copy" type="button">Copy</button>
          </div>
          <div class="lan-row cp-lanrow" hidden>
            <p class="field-label">LAN URL — for iOS / other Wi-Fi devices</p>
            <div class="url-box">
              <input class="url-input lan cp-lan" readonly />
              <button class="cp-copy-lan" type="button">Copy</button>
            </div>
          </div>
        </div>
        <button class="cp-help-toggle" type="button" aria-expanded="false">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/><path d="M6.2 6.1a1.8 1.8 0 0 1 3.5.6c0 1.2-1.8 1.5-1.8 2.5"/><path d="M8 11.6v.01"/></svg>
          <span class="label">Setup help</span>
          <svg class="chev" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 4l4 4-4 4"/></svg>
        </button>
        <p class="refresh-note">Refresh this page to start a fresh, isolated session — the URL rotates and the old one stops accepting writes.</p>
      </div>
      <div class="cp-setup" aria-hidden="true">
        <div class="cp-setup-inner">
          <h4 class="cp-setup-title">Set up your device</h4>
          <div class="tabs" role="tablist">
            <button class="tab active" data-tab="android" type="button">Android</button>
            <button class="tab" data-tab="ios" type="button">iOS</button>
            <button class="tab" data-tab="web" type="button">Web</button>
          </div>
          <div class="tab-panel active" data-panel="android">
            <ol class="setup-steps">
              <li><span class="num">1</span><span>Plug in with USB and enable <b>USB debugging</b> (Settings &rarr; Developer options).</span></li>
              <li><span class="num">2</span><span>In a terminal on this machine, run:
                <div class="cmd"><code>adb reverse tcp:${PORT} tcp:${PORT}</code><button class="cmd-copy" type="button">Copy</button></div>
                The phone's <code>localhost:${PORT}</code> now tunnels over USB to this server.</span></li>
              <li><span class="num">3</span><span>Paste the <b>Endpoint URL</b> into the Jelly toolbar and toggle <b>Sync</b> on.</span></li>
            </ol>
            <div class="note"><b>Note:</b> several USB devices tunnelling to one port look like a single client here. For multi-device QA, pair phones over Wi-Fi — each gets its own row.</div>
          </div>
          <div class="tab-panel" data-panel="ios">
            <ol class="setup-steps">
              <li><span class="num">1</span><span>Put the iPhone and this laptop on the same Wi-Fi network.</span></li>
              <li><span class="num">2</span><span>Scan the QR with the iOS camera, or paste the <b>LAN URL</b> into the Jelly toolbar's <b>Endpoint</b> setting.</span></li>
              <li><span class="num">3</span><span>Toggle <b>Sync</b> on. Grant <b>Local Network</b> permission if iOS prompts.</span></li>
            </ol>
            <div class="note"><b>Why no cable mode?</b> iOS has no standard tool routing the device's <code>localhost</code> back to the Mac, so Wi-Fi + LAN URL is the path. MDMs that block local-network traffic block this.</div>
          </div>
          <div class="tab-panel" data-panel="web">
            <ol class="setup-steps">
              <li><span class="num">1</span><span>Open the page hosting the Jelly browser toolbar.</span></li>
              <li><span class="num">2</span><span>Paste the <b>Endpoint URL</b> into the toolbar and toggle <b>Sync</b> on.</span></li>
              <li><span class="num">3</span><span>Same machine, same origin — no tunnelling needed.</span></li>
            </ol>
          </div>
        </div>
      </div>
    </div>`;

  function buildConnectPanel() {
    const root = document.createElement('div');
    root.innerHTML = CP_HTML;
    const shell = root.firstElementChild;

    const qrBox = shell.querySelector('.cp-qr');
    const hint = shell.querySelector('.qr-hint');
    const hasQR = drawQR(shell.querySelector('.cp-qr canvas'));
    if (hasQR) {
      shell.querySelector('.cp-title').textContent = 'Scan to connect';
      shell.querySelector('.cp-sub').textContent = "Point your phone's camera at the code — it opens the Jelly endpoint automatically.";
    } else {
      // No LAN IP: greyed QR placeholder keeps the layout, paste becomes primary.
      qrBox.classList.add('disabled');
      hint.textContent = 'Connect to Wi-Fi to enable scanning';
      shell.querySelector('.cp-title').textContent = 'Paste to connect';
      shell.querySelector('.cp-sub').textContent = 'No Wi-Fi network detected. Paste the endpoint URL into the Jelly toolbar, or join a Wi-Fi network to scan a QR.';
      shell.querySelector('.cp-or').hidden = true;
    }

    shell.querySelector('.cp-endpoint').value = endpointUrl;
    shell.querySelector('.cp-copy').addEventListener('click', (e) => copy(endpointUrl, e.currentTarget));
    if (lanEndpoint && lanEndpoint !== endpointUrl) {
      shell.querySelector('.cp-lanrow').hidden = false;
      shell.querySelector('.cp-lan').value = lanEndpoint;
      shell.querySelector('.cp-copy-lan').addEventListener('click', (e) => copy(lanEndpoint, e.currentTarget));
    }

    // Setup help expands the shell to the right rather than stacking downward.
    const toggle = shell.querySelector('.cp-help-toggle');
    const setup = shell.querySelector('.cp-setup');
    toggle.addEventListener('click', () => {
      const open = shell.classList.toggle('expanded');
      toggle.setAttribute('aria-expanded', String(open));
      setup.setAttribute('aria-hidden', String(!open));
      toggle.querySelector('.label').textContent = open ? 'Hide setup help' : 'Setup help';
    });

    shell.querySelectorAll('.tab').forEach((btn) => btn.addEventListener('click', () => {
      const name = btn.dataset.tab;
      shell.querySelectorAll('.tab').forEach((b) => b.classList.toggle('active', b.dataset.tab === name));
      shell.querySelectorAll('.tab-panel').forEach((p) => p.classList.toggle('active', p.dataset.panel === name));
    }));
    shell.querySelectorAll('.cmd-copy').forEach((btn) => btn.addEventListener('click', () => {
      const code = btn.closest('.cmd')?.querySelector('code')?.textContent?.trim();
      if (code) copy(code, btn);
    }));
    return shell;
  }

  // Main column shows the connect hero until a device pairs, then the feed.
  // (Devices are never removed within a session, so the hero only ever shows
  // at the start — build its QR once.)
  function syncMainView() {
    const hasDevices = devices.size > 0;
    $('connect-hero').hidden = hasDevices;
    $('feed-view').hidden = !hasDevices;
    $('connect-btn').hidden = !hasDevices;
    if (!hasDevices && !$('connect-hero').firstElementChild) {
      $('connect-hero').appendChild(buildConnectPanel());
    }
  }

  // "Connect another device" modal (reachable once ≥1 device is paired).
  function openConnectModal() {
    const mount = $('connect-modal-mount');
    mount.innerHTML = '';
    mount.appendChild(buildConnectPanel());
    $('connect-modal').hidden = false;
    setTimeout(() => $('connect-close').focus(), 0);
  }
  function closeConnectModal() {
    $('connect-modal').hidden = true;
    $('connect-modal-mount').innerHTML = '';
  }
  $('connect-btn').addEventListener('click', openConnectModal);
  $('connect-close').addEventListener('click', closeConnectModal);
  $('connect-modal').addEventListener('click', (e) => { if (e.target === $('connect-modal')) closeConnectModal(); });

  // ── State ──────────────────────────────────────────────────────────────
  const annotations = new Map();   // id -> annotation
  const order = [];                // ids, oldest first; rendered newest-first
  const imagesPresent = new Set(); // ids with an uploaded image
  const devices = new Map();       // key -> device (with lastSeenLocalMs)
  const deviceColorIdx = new Map();// key -> palette index (stable per device)
  let filterKey = null;            // null = show all devices
  let sseConnected = false;
  let renderedIds = new Set();     // ids currently in the DOM (animate only-new)

  const FRESH_MS = 18_000;         // within this of last heartbeat → "Connected"
  // Distinct, dark-bg-friendly colours assigned in device arrival order.
  const PALETTE = ['#84cc16', '#38bdf8', '#f59e0b', '#f472b6', '#a78bfa', '#2dd4bf', '#fb7185', '#facc15', '#60a5fa', '#34d399'];
  function colorFor(key) {
    if (!deviceColorIdx.has(key)) deviceColorIdx.set(key, deviceColorIdx.size % PALETTE.length);
    return PALETTE[deviceColorIdx.get(key)];
  }

  function deviceLabel(d) {
    if (!d) return 'Unknown device';
    const name = d.model || d.manufacturer || (d.platform && d.platform !== 'unknown'
      ? d.platform[0].toUpperCase() + d.platform.slice(1) : 'Unknown device');
    const os = d.osVersion
      ? (d.platform === 'android' ? 'Android ' + d.osVersion
        : d.platform === 'ios' ? 'iOS ' + d.osVersion
        : d.osVersion)
      : null;
    return os ? `${name} · ${os}` : name;
  }
  function platformTag(d) {
    const p = d?.platform;
    if (!p || p === 'unknown') return '';
    return p === 'ios' ? 'iOS' : p[0].toUpperCase() + p.slice(1);
  }
  function deviceInitial(d) {
    const s = d?.model || d?.manufacturer || d?.platform || '?';
    return s[0]?.toUpperCase() ?? '?';
  }

  function relTime(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    return h + 'h ago';
  }

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(typeof ts === 'number' ? ts : ts);
    if (Number.isNaN(d.getTime())) return '';
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    return sameDay
      ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
      : d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
  }

  // Mirrors OutputGenerator's Standard markdown so downstream agents read either source.
  function annotationMarkdown(a, index) {
    const lines = [];
    lines.push(`### ${index + 1}. ${a.element ?? 'Element'}`);
    const dev = devices.get(a._deviceKey) || a._device;
    if (dev) lines.push(`**Device:** ${deviceLabel(dev)}`);
    if (a.elementPath) lines.push(`**Location:** ${a.elementPath}`);
    if (a.sourceFile) lines.push(`**Source:** ${a.sourceFile}`);
    if (a.reactComponents) lines.push(`**Composables:** ${a.reactComponents}`);
    if (a.selectedText) lines.push(`**Selected text:** "${a.selectedText}"`);
    if (a.intent) lines.push(`**Intent:** ${a.intent}`);
    if (a.severity) lines.push(`**Severity:** ${a.severity}`);
    if (imagesPresent.has(a.id)) lines.push(`**Screenshot:** [attached]`);
    lines.push(`**Feedback:** ${a.comment ?? ''}`);
    return lines.join('\n');
  }

  // Annotations attributed to a device key (server stamps _deviceKey).
  function countFor(key) {
    let n = 0;
    for (const id of order) if (annotations.get(id)?._deviceKey === key) n++;
    return n;
  }

  // ── Device upsert + rendering ───────────────────────────────────────────
  // Anchor server time against the local clock so liveness dodges clock skew.
  function upsertDevice(d, serverNow) {
    if (!d?.key) return;
    const prev = devices.get(d.key);
    const lastSeenLocalMs = (d.lastHelloMs && serverNow)
      ? Date.now() - Math.max(0, serverNow - d.lastHelloMs)
      : (prev?.lastSeenLocalMs ?? null);
    devices.set(d.key, { ...prev, ...d, lastSeenLocalMs });
    colorFor(d.key);
  }

  function deviceStatus(d) {
    if (d.lastSeenLocalMs == null) return { cls: 'stale', text: 'No heartbeat yet' };
    const age = Date.now() - d.lastSeenLocalMs;
    if (age < FRESH_MS) return { cls: 'live pulse', text: 'Connected' };
    return { cls: 'stale', text: 'Last seen ' + relTime(age) };
  }

  function renderDevices() {
    syncMainView();
    const list = $('device-list');
    const ds = [...devices.values()].sort((a, b) => (a.firstSeenMs ?? 0) - (b.firstSeenMs ?? 0));
    $('device-count').textContent = ds.length ? String(ds.length) : '';
    list.innerHTML = '';
    if (!ds.length) {
      const empty = document.createElement('div');
      empty.className = 'device-empty';
      empty.innerHTML = sseConnected
        ? '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 21v.01M21 14v.01M14 21v.01"/></svg><span>Scan your QR code to connect a device.</span>'
        : 'Reconnecting to the server…';
      list.appendChild(empty);
      return;
    }
    for (const d of ds) {
      const color = colorFor(d.key);
      const st = deviceStatus(d);
      const row = document.createElement('button');
      row.type = 'button';
      row.className = 'device-row' + (filterKey === d.key ? ' active' : '');
      row.dataset.key = d.key;

      const swatch = document.createElement('span');
      swatch.className = 'swatch';
      swatch.style.background = color;
      swatch.textContent = deviceInitial(d);
      const dot = document.createElement('span');
      dot.className = 'live-dot ' + st.cls;
      swatch.appendChild(dot);

      const meta = document.createElement('span');
      meta.className = 'device-meta';
      const name = document.createElement('div');
      name.className = 'device-name';
      name.textContent = deviceLabel(d);
      const sub = document.createElement('div');
      sub.className = 'device-sub';
      sub.textContent = st.text;
      meta.append(name, sub);

      const tally = document.createElement('span');
      tally.className = 'device-tally';
      tally.textContent = countFor(d.key);

      row.append(swatch, meta, tally);
      row.addEventListener('click', () => setFilter(filterKey === d.key ? null : d.key));
      list.appendChild(row);
    }
  }

  // Lightweight per-second tick: update status text + dot without rebuilding
  // (rebuilding would restart the live-dot pulse and flicker).
  function tickDeviceStatuses() {
    for (const d of devices.values()) {
      const row = $('device-list').querySelector(`.device-row[data-key="${CSS.escape(d.key)}"]`);
      if (!row) continue;
      const st = deviceStatus(d);
      const dot = row.querySelector('.live-dot');
      if (dot) dot.className = 'live-dot ' + st.cls;
      const sub = row.querySelector('.device-sub');
      if (sub && sub.textContent !== st.text) sub.textContent = st.text;
    }
  }
  setInterval(tickDeviceStatuses, 1000);

  function renderServerDot() {
    const dot = $('server-dot');
    dot.classList.toggle('live', sseConnected);
    dot.classList.toggle('down', !sseConnected);
    dot.title = sseConnected ? 'Connected to local server' : 'Reconnecting to server…';
  }

  // ── Filters ──────────────────────────────────────────────────────────────
  function setFilter(key) {
    filterKey = key;
    renderFilters();
    renderDevices();
    render();
  }
  function renderFilters() {
    const bar = $('filters');
    const ds = [...devices.values()].sort((a, b) => (a.firstSeenMs ?? 0) - (b.firstSeenMs ?? 0));
    if (ds.length < 2) { bar.hidden = true; bar.innerHTML = ''; return; }
    bar.hidden = false;
    bar.innerHTML = '';
    bar.appendChild(chip(null, 'All devices', order.length, null));
    for (const d of ds) bar.appendChild(chip(d.key, deviceLabel(d), countFor(d.key), colorFor(d.key)));
  }
  function chip(key, label, n, color) {
    const c = document.createElement('button');
    c.type = 'button';
    c.className = 'chip' + (filterKey === key ? ' active' : '');
    if (color) {
      const dot = document.createElement('span');
      dot.className = 'chip-dot';
      dot.style.background = color;
      c.appendChild(dot);
    }
    const t = document.createElement('span');
    t.textContent = label;
    const cn = document.createElement('span');
    cn.className = 'chip-n';
    cn.textContent = n;
    c.append(t, cn);
    c.addEventListener('click', () => setFilter(key));
    return c;
  }

  // ── Feed ───────────────────────────────────────────────────────────────
  function render() {
    const feed = $('feed');
    $('count').textContent = String(order.length);
    $('clear-all').disabled = order.length === 0;

    // Newest first, filtered by selected device.
    const shown = [];
    for (let i = order.length - 1; i >= 0; i--) {
      const id = order[i];
      const a = annotations.get(id);
      if (!a) continue;
      if (filterKey && a._deviceKey !== filterKey) continue;
      shown.push({ id, a, index: i });
    }

    const emptyEl = $('empty');
    if (shown.length === 0) {
      emptyEl.hidden = false;
      emptyEl.innerHTML = filterKey
        ? 'No annotations from this device yet.'
        : '<span class="pulse-dot"></span>Waiting for the first annotation…';
    } else {
      emptyEl.hidden = true;
    }
    feed.innerHTML = '';
    const now = new Set();
    for (const { id, a, index } of shown) {
      // Animate only genuinely new cards — re-rendering on filter/update should
      // not replay the whole list's entrance.
      feed.appendChild(renderCard(a, index, !renderedIds.has(id)));
      now.add(id);
    }
    renderedIds = now;
  }

  function renderCard(a, index, animate) {
    const card = document.createElement('article');
    card.className = 'ann' + (animate ? ' enter' : '');
    card.dataset.id = a.id;

    const imgUrl = `${BASE}/annotations/${encodeURIComponent(a.id)}/image`;
    if (imagesPresent.has(a.id)) {
      const img = document.createElement('img');
      img.className = 'ann-img';
      img.alt = '';
      img.loading = 'lazy';
      img.src = imgUrl;
      card.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'ann-img placeholder';
      ph.textContent = a.screenshotPath ? 'Image uploading…' : 'No screenshot';
      card.appendChild(ph);
    }

    const body = document.createElement('div');
    body.className = 'ann-body';

    // Device tag — which device sent this annotation.
    const dev = devices.get(a._deviceKey) || a._device;
    if (a._deviceKey || dev) {
      const tag = document.createElement('div');
      tag.className = 'ann-device';
      const dot = document.createElement('span');
      dot.className = 'chip-dot';
      dot.style.background = colorFor(a._deviceKey ?? dev?.key ?? 'unknown');
      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = deviceLabel(dev);
      tag.append(dot, name);
      const pt = platformTag(dev);
      if (pt) { const p = document.createElement('span'); p.className = 'plat'; p.textContent = pt; tag.appendChild(p); }
      body.appendChild(tag);
    }

    const comment = document.createElement('p');
    comment.className = 'ann-comment';
    comment.textContent = a.comment ?? '';
    body.appendChild(comment);

    const badges = document.createElement('div');
    badges.className = 'badges';
    if (a.intent) badges.appendChild(badge('intent-' + a.intent, a.intent));
    if (a.severity) badges.appendChild(badge('severity-' + a.severity, a.severity));
    if (a.kind && a.kind !== 'feedback') badges.appendChild(badge('kind', a.kind));
    if (badges.children.length) body.appendChild(badges);

    const meta = document.createElement('div');
    meta.className = 'ann-meta';
    if (a.element) meta.appendChild(metaPart('Element', a.element));
    if (a.sourceFile) meta.appendChild(metaPart('Source', a.sourceFile));
    const time = fmtTime(a.createdAt ?? a.timestamp);
    if (time) meta.appendChild(metaPart('At', time));
    body.appendChild(meta);

    const actions = document.createElement('div');
    actions.className = 'ann-actions';

    const copyMd = document.createElement('button');
    copyMd.textContent = 'Copy markdown';
    copyMd.addEventListener('click', () => copy(annotationMarkdown(a, index), copyMd));
    actions.appendChild(copyMd);

    const copyText = document.createElement('button');
    copyText.textContent = 'Copy comment';
    copyText.addEventListener('click', () => copy(a.comment ?? '', copyText));
    actions.appendChild(copyText);

    if (imagesPresent.has(a.id)) {
      const copyImg = document.createElement('button');
      copyImg.textContent = 'Copy image';
      copyImg.addEventListener('click', () => copyImage(imgUrl, copyImg));
      actions.appendChild(copyImg);

      const open = document.createElement('button');
      open.textContent = 'Open image';
      open.addEventListener('click', () => window.open(imgUrl, '_blank'));
      actions.appendChild(open);
    }

    const del = document.createElement('button');
    del.className = 'btn-del';
    del.textContent = 'Delete';
    del.setAttribute('aria-label', 'Delete this annotation');
    del.addEventListener('click', () => deleteOne(a.id));
    actions.appendChild(del);

    body.appendChild(actions);
    card.appendChild(body);
    return card;
  }

  function badge(cls, text) {
    const b = document.createElement('span');
    b.className = 'badge ' + cls;
    b.textContent = text;
    return b;
  }
  function metaPart(label, value) {
    const span = document.createElement('span');
    span.innerHTML = `<b>${escapeHtml(label)}:</b> ${escapeHtml(value)}`;
    return span;
  }

  async function deleteOne(id) {
    try {
      const res = await fetch(`${BASE}/annotations/${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('http ' + res.status);
      // Server broadcasts a 'delete' SSE event that updates local state.
    } catch {
      toast('Delete failed');
    }
  }

  // ── Confirmation modal ───────────────────────────────────────────────────
  let confirmResolver = null;
  function showConfirm({ title = 'Are you sure?', body = '', confirmText = 'Confirm', danger = false } = {}) {
    return new Promise((resolve) => {
      if (confirmResolver) { confirmResolver(false); confirmResolver = null; }
      confirmResolver = resolve;
      $('confirm-title').textContent = title;
      $('confirm-body').textContent = body;
      const ok = $('confirm-ok');
      ok.textContent = confirmText;
      ok.classList.toggle('btn-danger', !!danger);
      ok.classList.toggle('btn-ghost', !danger);
      $('confirm-modal').hidden = false;
      setTimeout(() => $(danger ? 'confirm-cancel' : 'confirm-ok').focus(), 0);
    });
  }
  function closeConfirm(result) {
    if (confirmResolver) { confirmResolver(result); confirmResolver = null; }
    $('confirm-modal').hidden = true;
  }
  $('confirm-ok').addEventListener('click', () => closeConfirm(true));
  $('confirm-cancel').addEventListener('click', () => closeConfirm(false));
  $('confirm-modal').addEventListener('click', (e) => { if (e.target === $('confirm-modal')) closeConfirm(false); });
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !$('connect-modal').hidden) { closeConnectModal(); return; }
    if ($('confirm-modal').hidden) return;
    if (e.key === 'Escape') closeConfirm(false);
    else if (e.key === 'Enter') {
      if (document.activeElement === $('confirm-ok')) closeConfirm(true);
      else if (document.activeElement === $('confirm-cancel')) closeConfirm(false);
    }
  });

  $('clear-all').addEventListener('click', async () => {
    if ($('clear-all').disabled) return;
    const ok = await showConfirm({
      title: 'Delete all annotations?',
      body: 'Are you sure you want to delete all annotations? This action is not reversible.',
      confirmText: 'Delete all',
      danger: true,
    });
    if (!ok) return;
    try {
      const res = await fetch(`${BASE}/annotations`, { method: 'DELETE' });
      if (!res.ok) throw new Error('http ' + res.status);
    } catch {
      toast('Delete failed');
    }
  });

  // ── SSE ──────────────────────────────────────────────────────────────────
  let es;
  function connect() {
    es = new EventSource(`${BASE}/events`);

    es.addEventListener('hello', (ev) => {
      sseConnected = true;
      const data = JSON.parse(ev.data);
      for (const d of data.devices ?? []) upsertDevice(d, data.serverNow);
      renderServerDot();
      renderDevices();
      renderFilters();
    });

    es.addEventListener('device', (ev) => {
      const data = JSON.parse(ev.data);
      upsertDevice(data.device, data.serverNow);
      renderDevices(); // flips the hero → feed once the first device pairs
      renderFilters();
    });

    es.addEventListener('annotation', (ev) => {
      const a = JSON.parse(ev.data);
      const wasNew = !annotations.has(a.id);
      annotations.set(a.id, a);
      if (wasNew) order.push(a.id);
      // An annotation may reference a device we haven't rendered yet.
      if (a._device?.key && !devices.has(a._device.key)) { upsertDevice(a._device, null); renderDevices(); }
      renderFilters();
      renderDevices(); // refresh per-device tallies
      render();
    });

    es.addEventListener('image', (ev) => {
      const { id } = JSON.parse(ev.data);
      imagesPresent.add(id);
      const old = document.querySelector(`.ann[data-id="${CSS.escape(id)}"]`);
      const a = annotations.get(id);
      if (old && a) {
        old.replaceWith(renderCard(a, order.indexOf(id), false));
      } else {
        render();
      }
    });

    es.addEventListener('delete', (ev) => {
      const { id } = JSON.parse(ev.data);
      annotations.delete(id);
      imagesPresent.delete(id);
      const i = order.indexOf(id);
      if (i >= 0) order.splice(i, 1);
      renderFilters();
      renderDevices();
      render();
    });

    es.addEventListener('clear', () => {
      annotations.clear();
      imagesPresent.clear();
      order.length = 0;
      renderFilters();
      renderDevices();
      render();
    });

    es.onerror = () => {
      sseConnected = false;
      renderServerDot();
      renderDevices();
      // EventSource auto-reconnects.
    };
  }

  renderServerDot();
  renderDevices();
  render();
  connect();
})();
</script>
</body>
</html>
