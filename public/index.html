<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jelly Local Sync</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="app">
    <!-- ── Left rail: identity, live devices, and (secondary) connect ── -->
    <aside class="sidebar">
      <div class="brand">
        <span class="logo"></span>
        <h1>Jelly Local Sync</h1>
        <span class="server-dot" id="server-dot" title="Server connection"></span>
      </div>

      <div class="sec">
        <div class="sec-head">
          <h2>Devices</h2>
          <span class="count" id="device-count"></span>
        </div>
        <div id="device-list"></div>
      </div>

      <div class="rail-footer">
        <button class="connect-btn" id="connect-btn" type="button" hidden>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3v10M3 8h10"/></svg>
          Connect a device
        </button>
        <button class="intg-btn" id="integrations-btn" type="button">
          <span class="intg-btn-icon" id="intg-btn-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 9.5l-2 2a2.1 2.1 0 0 1-3-3l2-2"/><path d="M9.5 6.5l2-2a2.1 2.1 0 0 1 3 3l-2 2"/><path d="M6 10l4-4"/></svg></span>
          <span id="intg-btn-label">Connect</span>
        </button>
        <div class="rail-tertiary">
          <button id="troubleshoot-btn" type="button">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 1.5l6 3v4c0 3.5-2.4 5.6-6 6.5-3.6-.9-6-3-6-6.5v-4z"/><path d="M8 5.5v3"/><path d="M8 10.8v.01"/></svg>
            Troubleshoot
          </button>
          <button id="new-session-btn" type="button" title="Start a fresh capture session">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9"/><path d="M13.5 2v3h-3"/></svg>
            New session
          </button>
        </div>
      </div>
    </aside>

    <!-- ── Main: the live annotation feed ── -->
    <main class="main">
      <div class="main-inner">
        <!-- Empty-state hero: connecting the first device IS the task here. -->
        <div class="connect-hero" id="connect-hero" hidden></div>

        <!-- Feed view: shown once at least one device has paired. -->
        <div id="feed-view" hidden>
          <div class="feed-head">
            <h2>Annotations<span class="count" id="count">0</span></h2>
            <div class="feed-actions">
              <button class="btn-bulk" id="bulk-create" type="button" disabled></button>
              <button class="btn-clear-all" id="clear-all" type="button" disabled>Delete all</button>
            </div>
          </div>
          <div class="filters" id="filters" hidden></div>
          <div id="feed"></div>
          <div id="empty" class="empty"><span class="pulse-dot"></span>Waiting for the first annotation…</div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <div id="connect-modal" class="modal-backdrop connect-modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Connect a device" style="position: relative;">
      <button class="modal-close" id="connect-close" type="button" aria-label="Close">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8"/></svg>
      </button>
      <div id="connect-modal-mount"></div>
    </div>
  </div>

  <div id="troubleshoot-modal" class="modal-backdrop ts-modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Troubleshoot connection" style="position: relative;">
      <button class="modal-close" id="troubleshoot-close" type="button" aria-label="Close">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8"/></svg>
      </button>
      <div id="troubleshoot-mount"></div>
    </div>
  </div>

  <div id="integrations-modal" class="modal-backdrop" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Connect an integration" style="position: relative; max-width: 460px;">
      <button class="modal-close" id="integrations-close" type="button" aria-label="Close">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8"/></svg>
      </button>
      <h3 class="modal-title">Connect an integration</h3>
      <p class="modal-body" style="margin-bottom: 16px;">Push synced annotations straight into your tracker as tickets.</p>
      <div class="intg-list" id="integrations-list"></div>
    </div>
  </div>

  <div id="ticket-modal" class="modal-backdrop" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Create ticket" style="position: relative; max-width: 460px;">
      <button class="modal-close" id="ticket-close" type="button" aria-label="Close">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8"/></svg>
      </button>
      <div id="ticket-mount"></div>
    </div>
  </div>

  <div id="bulk-modal" class="modal-backdrop" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Create multiple ClickUp tickets" style="position: relative; max-width: 520px;">
      <button class="modal-close" id="bulk-close" type="button" aria-label="Close">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8"/></svg>
      </button>
      <div id="bulk-mount"></div>
    </div>
  </div>

  <div id="confirm-modal" class="modal-backdrop" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-body">
      <h3 class="modal-title" id="confirm-title">Are you sure?</h3>
      <p class="modal-body" id="confirm-body"></p>
      <div class="modal-actions">
        <button class="btn-ghost" id="confirm-cancel" type="button">Cancel</button>
        <button class="btn-danger" id="confirm-ok" type="button">Confirm</button>
      </div>
    </div>
  </div>

<script src="/qrcode.js"></script>
<script>
  // Server-templated session + network globals, the only values index.html
  // injects. app.js (a static, cacheable file) reads them from here.
  window.JELLY = { token: '__TOKEN__', port: '__PORT__', host: '__HOST__', lanIp: '__LAN_IP__', lanIps: __LAN_IPS__ };
</script>
<script src="/app.js"></script>
</body>
</html>
